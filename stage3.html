<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 3 Flash Cards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 820px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background: #f7f8fb;
    }

    h1 {
      margin-bottom: 8px;
    }

    h2 {
      margin-top: 0;
      color: #555;
      font-size: 1rem;
      font-weight: normal;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #0066cc;
      text-decoration: none;
    }

    .guide {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .book-list {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .book-item {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
    }

    .book-item a {
      text-decoration: none;
      color: #222;
      font-weight: bold;
      display: block;
    }

    .book-id {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 4px;
    }

    .card-wrap {
      perspective: 1200px;
      width: 320px;
      height: 220px;
      margin: 24px auto 18px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      background: white;
      border: 1px solid #e5e5e5;
    }

    .card-front {
      font-size: 2rem;
      font-weight: bold;
      color: #222;
    }

    .card-back {
      transform: rotateY(180deg);
      font-size: 1.7rem;
      font-weight: bold;
      color: #333;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button.light {
      background: #10b981;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .counter {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #666;
    }
  </style>
</head>
<body>
  <a class="top-link" href="index.html">← Home</a>

  <h1 id="title">Stage 3 Flash Cards</h1>
  <h2 id="subtitle"></h2>
  <div id="content"></div>

  <script>
    const BOOKS = {
      "s3-2-1": {
        title: "On the Sand",
        words: [
          { en: "sand", ko: "모래" },
          { en: "sleep", ko: "잠자다" },
          { en: "sandcastle", ko: "모래성" },
          { en: "hat", ko: "모자" },
          { en: "top", ko: "맨 위, 꼭대기" },
          { en: "ice cream", ko: "아이스크림" },
          { en: "donkeys", ko: "당나귀들" },
          { en: "boat", ko: "보트" },
          { en: "go-karts", ko: "고카트들" },
          { en: "hiding", ko: "숨어 있는, 숨어 있기" }
        ]
      },
      "s3-2-2": {
        title: "The Egg Hunt",
        words: [
          { en: "came", ko: "왔다" },
          { en: "made", ko: "만들었다" },
          { en: "cake", ko: "케이크" },
          { en: "eggs", ko: "달걀들" },
          { en: "idea", ko: "생각" },
          { en: "park", ko: "공원" },
          { en: "trees", ko: "나무들" },
          { en: "flowers", ko: "꽃들" },
          { en: "squirrels", ko: "다람쥐들" },
          { en: "looked", ko: "보았다" }
        ]
      },
      "s3-2-3": {
        title: "Nobody Wanted to Play",
        words: [
          { en: "park", ko: "공원" },
          { en: "rocket", ko: "로켓" },
          { en: "see-saw", ko: "시소" },
          { en: "horse", ko: "말" },
          { en: "bicycle", ko: "자전거" },
          { en: "ladder", ko: "사다리" },
          { en: "wall", ko: "벽" },
          { en: "spaceman", ko: "우주인" },
          { en: "juggler", ko: "저글러" },
          { en: "cowboy", ko: "카우보이" }
        ]
      },
      "s3-2-4": {
        title: "A Cat in the Tree",
        words: [
          { en: "barked", ko: "짖었다" },
          { en: "climbed up", ko: "위로 올라갔다" },
          { en: "tree", ko: "나무" },
          { en: "wall", ko: "벽" },
          { en: "ladder", ko: "사다리" },
          { en: "climbed down", ko: "내려왔다" },
          { en: "put", ko: "놓았다" },
          { en: "jumped", ko: "뛰어내렸다" },
          { en: "fireman", ko: "소방관" },
          { en: "everyone", ko: "모두" }
        ]
      },
      "s3-2-5": {
        title: "The Rope Swing",
        words: [
          { en: "children", ko: "아이들" },
          { en: "stream", ko: "개울" },
          { en: "swing", ko: "그네" },
          { en: "rope", ko: "밧줄" },
          { en: "climbed", ko: "올라갔다" },
          { en: "pushed", ko: "밀었다" },
          { en: "looked", ko: "보았다" },
          { en: "barked", ko: "짖었다" },
          { en: "went", ko: "갔다" },
          { en: "home", ko: "집" }
        ]
      },
      "s3-2-6": {
        title: "By the Stream",
        words: [
          { en: "rug", ko: "돗자리" },
          { en: "stream", ko: "개울" },
          { en: "bridge", ko: "다리" },
          { en: "sticks", ko: "나뭇가지들" },
          { en: "water", ko: "물" },
          { en: "climbed", ko: "올라갔다" },
          { en: "dropped", ko: "떨어뜨렸다" },
          { en: "fell", ko: "떨어졌다" },
          { en: "Teddy", ko: "테디 인형" },
          { en: "get", ko: "가져오다" }
        ]
      }
    };

    let voices = [];
    let currentBookId = null;
    let currentIndex = 0;
    let flipped = false;

    function sortBookIds(ids) {
      return ids.sort((a, b) => {
        const pa = a.toLowerCase().split("-");
        const pb = b.toLowerCase().split("-");
        const aStage = Number(pa[0].replace("s", ""));
        const bStage = Number(pb[0].replace("s", ""));
        const aSet = Number(pa[1]);
        const bSet = Number(pb[1]);
        const aOrder = Number(pa[2]);
        const bOrder = Number(pb[2]);
        if (aStage !== bStage) return aStage - bStage;
        if (aSet !== bSet) return aSet - bSet;
        return aOrder - bOrder;
      });
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices();
    }

    function pickVoice(langPrefix, preferredNames = []) {
      const langVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix.toLowerCase()));
      for (const name of preferredNames) {
        const found = langVoices.find(v => v.name.toLowerCase().includes(name.toLowerCase()));
        if (found) return found;
      }
      return langVoices[0] || null;
    }

    function speakText(text, lang) {
      speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;

      if (lang.startsWith("en")) {
        u.rate = 0.78;
        u.pitch = 1.0;
        const voice = pickVoice("en", [
          "google us english",
          "google uk english female",
          "samantha",
          "daniel",
          "microsoft aria",
          "microsoft guy",
          "zira"
        ]);
        if (voice) u.voice = voice;
      } else if (lang.startsWith("ko")) {
        u.rate = 0.95;
        u.pitch = 1.0;
        const voice = pickVoice("ko", [
          "google 한국의",
          "microsoft sunhi",
          "yuna"
        ]);
        if (voice) u.voice = voice;
      }

      speechSynthesis.speak(u);
    }

    function renderBookList() {
      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const content = document.getElementById("content");

      title.innerText = "Stage 3 Flash Cards";
      subtitle.innerText = "Book List";

      const ids = sortBookIds(Object.keys(BOOKS));

      content.innerHTML = `
        <div class="guide">책을 선택하면 플래시카드 학습으로 이동합니다.</div>
        <div class="book-list">
          ${ids.map(id => `
            <div class="book-item">
              <div class="book-id">${id.toUpperCase()}</div>
              <a href="stage3.html?book=${id}">${BOOKS[id].title}</a>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCard() {
      const book = BOOKS[currentBookId];
      const word = book.words[currentIndex];

      document.getElementById("title").innerText = book.title;
      document.getElementById("subtitle").innerText = currentBookId.toUpperCase();

      document.getElementById("content").innerHTML = `
        <div class="guide">카드를 누르면 뜻이 보입니다. 앞면은 영어, 뒷면은 한국어입니다.</div>

        <div class="card-wrap">
          <div class="card ${flipped ? "flipped" : ""}" id="flashcard">
            <div class="card-face card-front">${word.en}</div>
            <div class="card-face card-back">${word.ko}</div>
          </div>
        </div>

        <div class="controls">
          <button class="secondary" id="prevBtn" ${currentIndex === 0 ? "disabled" : ""}>이전</button>
          <button class="light" id="playBtn">다시 듣기</button>
          <button class="secondary" id="flipBtn">뒤집기</button>
          <button id="nextBtn" ${currentIndex === book.words.length - 1 ? "disabled" : ""}>다음</button>
        </div>

        <div class="counter">${currentIndex + 1} / ${book.words.length}</div>
      `;

      document.getElementById("flashcard").addEventListener("click", flipCard);
      document.getElementById("flipBtn").addEventListener("click", flipCard);
      document.getElementById("prevBtn").addEventListener("click", prevCard);
      document.getElementById("nextBtn").addEventListener("click", nextCard);
      document.getElementById("playBtn").addEventListener("click", replayAudio);
    }

    function playFrontAudio() {
      const book = BOOKS[currentBookId];
      const word = book.words[currentIndex];
      speakText(word.en, "en-US");
    }

    function playBackAudio() {
      const book = BOOKS[currentBookId];
      const word = book.words[currentIndex];
      speakText(word.ko, "ko-KR");
    }

    function replayAudio() {
      if (flipped) {
        playBackAudio();
      } else {
        playFrontAudio();
      }
    }

    function flipCard() {
      flipped = !flipped;
      const card = document.getElementById("flashcard");
      card.classList.toggle("flipped", flipped);

      setTimeout(() => {
        if (flipped) {
          playBackAudio();
        } else {
          playFrontAudio();
        }
      }, 260);
    }

    function nextCard() {
      const book = BOOKS[currentBookId];
      if (currentIndex < book.words.length - 1) {
        currentIndex++;
        flipped = false;
        renderCard();
        setTimeout(playFrontAudio, 150);
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        flipped = false;
        renderCard();
        setTimeout(playFrontAudio, 150);
      }
    }

    window.onload = function () {
      loadVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
      }

      const params = new URLSearchParams(location.search);
      const bookId = params.get("book");

      if (!bookId || !BOOKS[bookId]) {
        renderBookList();
        return;
      }

      currentBookId = bookId;
      currentIndex = 0;
      flipped = false;
      renderCard();

      setTimeout(playFrontAudio, 300);
    };
  </script>
</body>
</html>
