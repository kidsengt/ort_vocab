<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 3 Flashcards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f6f7fb;
      color: #222;
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .topbar a {
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 1.8rem;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #666;
      font-weight: normal;
    }

    .guide {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button, select {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.98rem;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button.green {
      background: #059669;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    select {
      border: 1px solid #d1d5db;
      background: white;
      color: #222;
    }

    .card-stage {
      margin-top: 12px;
    }

    .card-wrap {
      width: 360px;
      max-width: 90vw;
      height: 240px;
      margin: 0 auto 18px;
      perspective: 1200px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 22px;
      background: white;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card-front {
      font-size: 2rem;
      font-weight: bold;
      line-height: 1.25;
    }

    .card-back {
      transform: rotateY(180deg);
      font-size: 1.6rem;
      font-weight: bold;
      line-height: 1.5;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .counter {
      color: #666;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .book-list {
      display: grid;
      gap: 12px;
      margin-top: 20px;
      text-align: left;
    }

    .book-item {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
    }

    .book-item a {
      text-decoration: none;
      color: #222;
      font-weight: bold;
      display: block;
    }

    .book-id {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">← Home</a>
    <a href="stage3.html">Book List</a>
  </div>

  <h1 id="title">Stage 3 Flashcards</h1>
  <h2 id="subtitle"></h2>
  <div id="content"></div>

  <script>
    const BOOKS = {
      "s3-2-1": {
        title: "On the Sand",
        words: [
          { en: "sand", ko: "모래" },
          { en: "sleep", ko: "잠자다" },
          { en: "sandcastle", ko: "모래성" },
          { en: "hat", ko: "모자" },
          { en: "top", ko: "맨 위, 꼭대기" },
          { en: "ice cream", ko: "아이스크림" },
          { en: "donkeys", ko: "당나귀들" },
          { en: "boat", ko: "보트" },
          { en: "go-karts", ko: "고카트들" },
          { en: "hiding", ko: "숨어 있는, 숨어 있기" }
        ]
      },
      "s3-2-2": {
        title: "The Egg Hunt",
        words: [
          { en: "came", ko: "왔다" },
          { en: "made", ko: "만들었다" },
          { en: "cake", ko: "케이크" },
          { en: "eggs", ko: "달걀들" },
          { en: "idea", ko: "생각" },
          { en: "park", ko: "공원" },
          { en: "trees", ko: "나무들" },
          { en: "flowers", ko: "꽃들" },
          { en: "squirrels", ko: "다람쥐들" },
          { en: "looked", ko: "보았다" }
        ]
      },
      "s3-2-3": {
        title: "Nobody Wanted to Play",
        words: [
          { en: "park", ko: "공원" },
          { en: "rocket", ko: "로켓" },
          { en: "see-saw", ko: "시소" },
          { en: "horse", ko: "말" },
          { en: "bicycle", ko: "자전거" },
          { en: "ladder", ko: "사다리" },
          { en: "wall", ko: "벽" },
          { en: "spaceman", ko: "우주인" },
          { en: "juggler", ko: "저글러" },
          { en: "cowboy", ko: "카우보이" }
        ]
      },
      "s3-2-4": {
        title: "A Cat in the Tree",
        words: [
          { en: "barked", ko: "짖었다" },
          { en: "climbed up", ko: "위로 올라갔다" },
          { en: "tree", ko: "나무" },
          { en: "wall", ko: "벽" },
          { en: "ladder", ko: "사다리" },
          { en: "climbed down", ko: "내려왔다" },
          { en: "put", ko: "놓았다" },
          { en: "jumped", ko: "뛰어내렸다" },
          { en: "fireman", ko: "소방관" },
          { en: "everyone", ko: "모두" }
        ]
      },
      "s3-2-5": {
        title: "The Rope Swing",
        words: [
          { en: "children", ko: "아이들" },
          { en: "stream", ko: "개울" },
          { en: "swing", ko: "그네" },
          { en: "rope", ko: "밧줄" },
          { en: "climbed", ko: "올라갔다" },
          { en: "pushed", ko: "밀었다" },
          { en: "looked", ko: "보았다" },
          { en: "barked", ko: "짖었다" },
          { en: "went", ko: "갔다" },
          { en: "home", ko: "집" }
        ]
      },
      "s3-2-6": {
        title: "By the Stream",
        words: [
          { en: "rug", ko: "돗자리" },
          { en: "stream", ko: "개울" },
          { en: "bridge", ko: "다리" },
          { en: "sticks", ko: "나뭇가지들" },
          { en: "water", ko: "물" },
          { en: "climbed", ko: "올라갔다" },
          { en: "dropped", ko: "떨어뜨렸다" },
          { en: "fell", ko: "떨어졌다" },
          { en: "Teddy", ko: "테디 인형" },
          { en: "get", ko: "가져오다" }
        ]
      }
    };

    const synth = window.speechSynthesis;
    let voices = [];
    let englishVoices = [];
    let koreanVoices = [];

    let currentBookId = null;
    let deck = [];
    let currentIndex = 0;
    let flipped = false;
    let autoPlay = false;
    let autoTimer = null;
    let frontMode = "en"; // en or ko

    function sortBookIds(ids) {
      return ids.sort((a, b) => {
        const pa = a.toLowerCase().split("-");
        const pb = b.toLowerCase().split("-");
        const aStage = Number(pa[0].replace("s", ""));
        const bStage = Number(pb[0].replace("s", ""));
        const aSet = Number(pa[1]);
        const bSet = Number(pb[1]);
        const aOrder = Number(pa[2]);
        const bOrder = Number(pb[2]);
        if (aStage !== bStage) return aStage - bStage;
        if (aSet !== bSet) return aSet - bSet;
        return aOrder - bOrder;
      });
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalizeName(s) {
      return (s || "").toLowerCase();
    }

    function loadVoices() {
      voices = synth.getVoices();

      englishVoices = voices.filter(v =>
        (v.lang || "").toLowerCase().startsWith("en")
      );

      koreanVoices = voices.filter(v =>
        (v.lang || "").toLowerCase().startsWith("ko")
      );
    }

    function pickBestEnglishVoice() {
      if (!englishVoices.length) return null;

      const priority = [
        "microsoft aria online",
        "microsoft guy online",
        "microsoft jenny online",
        "google us english",
        "google uk english female",
        "samantha",
        "daniel",
        "microsoft aria",
        "microsoft guy",
        "zira"
      ];

      for (const key of priority) {
        const found = englishVoices.find(v => normalizeName(v.name).includes(key));
        if (found) return found;
      }

      const usVoice = englishVoices.find(v => (v.lang || "").toLowerCase().includes("en-us"));
      if (usVoice) return usVoice;

      return englishVoices[0];
    }

    function pickBestKoreanVoice() {
      if (!koreanVoices.length) return null;

      const priority = [
        "microsoft sunhi",
        "google 한국의",
        "yuna"
      ];

      for (const key of priority) {
        const found = koreanVoices.find(v => normalizeName(v.name).includes(key));
        if (found) return found;
      }

      return koreanVoices[0];
    }

    function speakFront() {
      const word = deck[currentIndex];
      const u = new SpeechSynthesisUtterance(frontMode === "en" ? word.en : word.ko);
      u.lang = frontMode === "en" ? "en-US" : "ko-KR";
      u.rate = frontMode === "en" ? 0.72 : 0.95;
      u.pitch = 1;
      u.voice = frontMode === "en" ? pickBestEnglishVoice() : pickBestKoreanVoice();
      synth.cancel();
      synth.speak(u);
    }

    function speakBack() {
      const word = deck[currentIndex];
      const u = new SpeechSynthesisUtterance(frontMode === "en" ? word.ko : word.en);
      u.lang = frontMode === "en" ? "ko-KR" : "en-US";
      u.rate = frontMode === "en" ? 0.95 : 0.72;
      u.pitch = 1;
      u.voice = frontMode === "en" ? pickBestKoreanVoice() : pickBestEnglishVoice();
      synth.cancel();
      synth.speak(u);
    }

    function stopAutoPlay() {
      autoPlay = false;
      if (autoTimer) {
        clearTimeout(autoTimer);
        autoTimer = null;
      }
    }

    function renderBookList() {
      stopAutoPlay();
      document.getElementById("title").innerText = "Stage 3 Flashcards";
      document.getElementById("subtitle").innerText = "Book List";

      const ids = sortBookIds(Object.keys(BOOKS));

      document.getElementById("content").innerHTML = `
        <div class="guide">책을 선택하면 플래시카드 학습이 시작됩니다.</div>
        <div class="book-list">
          ${ids.map(id => `
            <div class="book-item">
              <div class="book-id">${id.toUpperCase()}</div>
              <a href="stage3.html?book=${id}">${BOOKS[id].title}</a>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCard() {
      const book = BOOKS[currentBookId];
      const word = deck[currentIndex];

      document.getElementById("title").innerText = book.title;
      document.getElementById("subtitle").innerText = `${currentBookId.toUpperCase()} · ${currentIndex + 1} / ${deck.length}`;

      const frontText = frontMode === "en" ? word.en : word.ko;
      const backText = frontMode === "en" ? word.ko : word.en;

      document.getElementById("content").innerHTML = `
        <div class="guide">카드를 누르면 뒤집힙니다. 아래 버튼으로 이동하거나, Shuffle과 Auto Play를 사용할 수 있습니다.</div>

        <div class="toolbar">
          <button class="secondary" id="shuffleBtn">Shuffle</button>
          <button class="green" id="autoBtn">${autoPlay ? "Stop Auto" : "Auto Play"}</button>
          <button class="secondary" id="replayBtn">Replay</button>
          <select id="frontModeSelect">
            <option value="en" ${frontMode === "en" ? "selected" : ""}>영어 먼저</option>
            <option value="ko" ${frontMode === "ko" ? "selected" : ""}>뜻 먼저</option>
          </select>
        </div>

        <div class="card-stage">
          <div class="card-wrap">
            <div class="card ${flipped ? "flipped" : ""}" id="flashcard">
              <div class="card-face card-front">${frontText}</div>
              <div class="card-face card-back">${backText}</div>
            </div>
          </div>
        </div>

        <div class="nav">
          <button class="secondary" id="prevBtn" ${currentIndex === 0 ? "disabled" : ""}>이전</button>
          <button class="secondary" id="flipBtn">뒤집기</button>
          <button id="nextBtn" ${currentIndex === deck.length - 1 ? "disabled" : ""}>다음</button>
        </div>

        <div class="counter">${currentIndex + 1} / ${deck.length}</div>
      `;

      document.getElementById("flashcard").addEventListener("click", flipCard);
      document.getElementById("flipBtn").addEventListener("click", flipCard);
      document.getElementById("prevBtn").addEventListener("click", prevCard);
      document.getElementById("nextBtn").addEventListener("click", nextCard);
      document.getElementById("shuffleBtn").addEventListener("click", shuffleDeck);
      document.getElementById("replayBtn").addEventListener("click", replayCurrent);
      document.getElementById("autoBtn").addEventListener("click", toggleAutoPlay);
      document.getElementById("frontModeSelect").addEventListener("change", changeFrontMode);
    }

    function replayCurrent() {
      if (flipped) {
        speakBack();
      } else {
        speakFront();
      }
    }

    function flipCard() {
      flipped = !flipped;
      document.getElementById("flashcard").classList.toggle("flipped", flipped);

      setTimeout(() => {
        if (flipped) speakBack();
        else speakFront();
      }, 240);
    }

    function nextCard() {
      stopAutoPlay();
      goNext();
    }

    function prevCard() {
      stopAutoPlay();
      goPrev();
    }

    function goNext() {
      if (currentIndex < deck.length - 1) {
        currentIndex++;
        flipped = false;
        renderCard();
        setTimeout(speakFront, 180);
      }
    }

    function goPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        flipped = false;
        renderCard();
        setTimeout(speakFront, 180);
      }
    }

    function shuffleDeck() {
      stopAutoPlay();
      deck = shuffleArray(deck);
      currentIndex = 0;
      flipped = false;
      renderCard();
      setTimeout(speakFront, 180);
    }

    function toggleAutoPlay() {
      autoPlay = !autoPlay;
      renderCard();
      if (autoPlay) {
        runAutoPlay();
      } else if (autoTimer) {
        clearTimeout(autoTimer);
        autoTimer = null;
      }
    }

    function runAutoPlay() {
      if (!autoPlay) return;

      flipped = false;
      renderCard();
      speakFront();

      autoTimer = setTimeout(() => {
        if (!autoPlay) return;
        flipped = true;
        renderCard();
        speakBack();

        autoTimer = setTimeout(() => {
          if (!autoPlay) return;
          if (currentIndex < deck.length - 1) {
            currentIndex++;
            runAutoPlay();
          } else {
            autoPlay = false;
            renderCard();
          }
        }, 1800);
      }, 1600);
    }

    function changeFrontMode(e) {
      stopAutoPlay();
      frontMode = e.target.value;
      flipped = false;
      renderCard();
      setTimeout(speakFront, 180);
    }

    function initBook(bookId) {
      currentBookId = bookId;
      deck = [...BOOKS[bookId].words];
      currentIndex = 0;
      flipped = false;
      renderCard();
      setTimeout(speakFront, 300);
    }

    function startApp() {
      loadVoices();
      const params = new URLSearchParams(location.search);
      const bookId = params.get("book");

      if (!bookId || !BOOKS[bookId]) {
        renderBookList();
        return;
      }

      initBook(bookId);
    }

    window.onload = () => {
      startApp();
      if (typeof synth.addEventListener === "function") {
        synth.addEventListener("voiceschanged", loadVoices);
      } else if (synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
      }
    };

    document.addEventListener("keydown", (e) => {
      if (!currentBookId) return;
      if (e.key === "ArrowRight") nextCard();
      if (e.key === "ArrowLeft") prevCard();
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        flipCard();
      }
    });
  </script>
</body>
</html>
