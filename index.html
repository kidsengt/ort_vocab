<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORT Vocabulary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
      text-align: center;
      background: #f7f8fb;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .main-link {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1rem;
    }

    .note {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #777;
      line-height: 1.7;
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ORT Vocabulary</h1>
    <p>플래시카드로 단어를 듣고, 뒤집고, 반복해서 학습할 수 있습니다.</p>

    <a class="main-link" href="flashcards.html">전체 책 보기</a>

    <div class="note">
      학생에게는 개별 책 링크를 직접 전달하면 됩니다.<br />
      예: <code>flashcards.html?book=s3-2-6</code>
    </div>
  </div>
</body>
</html>
